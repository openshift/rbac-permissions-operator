---
# This Job cleans up old OLM resources after migrating to PKO
apiVersion: v1
kind: ServiceAccount
metadata:
  name: olm-cleanup
  namespace: openshift-rbac-permissions
  annotations:
    package-operator.run/phase: cleanup-rbac
    package-operator.run/collision-protection: IfNoController
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: olm-cleanup
  namespace: openshift-rbac-permissions
  annotations:
    package-operator.run/phase: cleanup-rbac
    package-operator.run/collision-protection: IfNoController
rules:
  - apiGroups:
      - operators.coreos.com
    resources:
      - clusterserviceversions
      - subscriptions
    verbs:
      - list
      - get
      - watch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: olm-cleanup
  namespace: openshift-rbac-permissions
  annotations:
    package-operator.run/phase: cleanup-rbac
    package-operator.run/collision-protection: IfNoController
roleRef:
  kind: Role
  name: olm-cleanup
  apiGroup: rbac.authorization.k8s.io
subjects:
  - kind: ServiceAccount
    name: olm-cleanup
    namespace: openshift-rbac-permissions
---
apiVersion: batch/v1
kind: Job
metadata:
  name: olm-cleanup
  namespace: openshift-rbac-permissions
  annotations:
    package-operator.run/phase: cleanup-deploy
    package-operator.run/collision-protection: IfNoController
spec:
  ttlSecondsAfterFinished: 100
  template:
    metadata:
      annotations:
        openshift.io/required-scc: restricted-v2
    spec:
      serviceAccountName: olm-cleanup
      priorityClassName: openshift-user-critical
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: delete-csv
          image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          command:
            - sh
            - -c
            - |
              #!/bin/sh
              set -euxo pipefail
              # Delete Subscription first to prevent OLM from recreating CSV
              oc -n openshift-rbac-permissions delete subscription \
                -l "operators.coreos.com/rbac-permissions-operator.openshift-rbac-permissions" \
                --ignore-not-found
              # Delete ClusterServiceVersion
              oc -n openshift-rbac-permissions delete csv \
                -l "operators.coreos.com/rbac-permissions-operator.openshift-rbac-permissions" \
                --ignore-not-found
          resources:
            requests:
              cpu: 100m
              memory: 100Mi

apiVersion: v1
kind: Template
parameters:
  - name: PKO_IMAGE
    required: true
  - name: OPERATOR_IMAGE
    required: true
  - name: IMAGE_TAG
    required: true
  - name: IMAGE_DIGEST
    required: true
  - name: NAMESPACE
    value: openshift-rbac-permissions
  - name: REPO_NAME
    value: rbac-permissions-operator
    required: true
metadata:
  name: selectorsyncset-template
objects:
  - apiVersion: hive.openshift.io/v1
    kind: SelectorSyncSet
    metadata:
      labels:
        managed.openshift.io/gitHash: ${IMAGE_TAG}
        managed.openshift.io/gitRepoName: ${REPO_NAME}
        managed.openshift.io/osd: "true"
      # NOTE: This manifest deploys to stage. For production, update the name
      # and clusterDeploymentSelector labels accordingly.
      name: rbac-permissions-operator
    spec:
      clusterDeploymentSelector:
        matchLabels:
          api.openshift.com/managed: "true"
      resourceApplyMode: Sync
      resources:
        - apiVersion: v1
          kind: Namespace
          metadata:
            name: ${NAMESPACE}
            labels:
              openshift.io/cluster-monitoring: "true"
        - apiVersion: package-operator.run/v1alpha1
          kind: ClusterPackage
          metadata:
            name: "${REPO_NAME}"
            annotations:
              package-operator.run/collision-protection: IfNoController
          spec:
            # Pin PKO package image by digest for reproducibility
            image: ${PKO_IMAGE}@${IMAGE_DIGEST}
            config:
              # Operator image uses same git SHA tag (built from same commit)
              image: ${OPERATOR_IMAGE}:${IMAGE_TAG}
